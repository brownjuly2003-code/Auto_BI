- name: dm.sales
  description: Продажи по дням, магазинам и товарам
  columns:
  - name: date
    type: date
    role: time
  - name: store_id
    type: integer
    role: dimension
    fk: dm.stores.store_id
  - name: product_id
    type: integer
    role: dimension
    fk: dm.products.product_id
  - name: revenue
    type: numeric(12,2)
    role: measure
    description: Выручка, руб
    agg: sum
  - name: qty
    type: integer
    role: measure
    agg: sum
  - name: orders
    type: integer
    role: measure
    agg: sum
  physical:
    engine: greenplum
    distribution_key:
    - store_id
    partition_key: date
    rows: 300000
    cardinality:
      date: 182
      store_id: 20
      product_id: 50
      revenue: 90276
      qty: 11
      orders: 1
