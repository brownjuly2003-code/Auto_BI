# P8 demo router: one public port (7860, the only one HF Spaces expose).
#   /agent/* -> auto_bi (prefix stripped; the UI resolves everything relative)
#   /*       -> Superset (needs the root: /superset/*, /static/assets, /api/v1/*)
# Runs as UID 1000 -> pid/temp/logs live in /tmp.
pid /tmp/nginx.pid;
error_log /dev/stderr warn;
worker_processes 1;

events { worker_connections 512; }

http {
    access_log off;
    client_body_temp_path /tmp/nginx-body;
    proxy_temp_path /tmp/nginx-proxy;
    fastcgi_temp_path /tmp/nginx-fastcgi;
    uwsgi_temp_path /tmp/nginx-uwsgi;
    scgi_temp_path /tmp/nginx-scgi;

    server {
        listen 7860;

        # the demo starts at the agent UI, not at Superset's login page
        location = / { return 302 /agent/; }
        # no trailing slash -> relative asset paths would resolve against /
        location = /agent { return 301 /agent/; }

        location /agent/ {
            proxy_pass http://127.0.0.1:8200/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            # SSE (build log stream): never buffer, allow long builds
            proxy_buffering off;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
        }

        location / {
            proxy_pass http://127.0.0.1:8088;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;
        }
    }
}
