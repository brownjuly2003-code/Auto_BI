repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  # mypy on the whole auto_bi package (not per-file) via the project's uv env, mirroring
  # the CI step. Runs only when an auto_bi source file changes.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (auto_bi)
        entry: uv run --with mypy --with types-PyYAML mypy auto_bi
        language: system
        pass_filenames: false
        files: ^auto_bi/.*\.py$
