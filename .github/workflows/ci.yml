name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format & tests (offline)
    runs-on: ubuntu-latest
    # contents:write only used by the coverage-badge commit-back step below, which
    # itself only runs on push to main (never on PRs, incl. forked ones).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Layer-2 publication guard (B-3): .gitignore keeps internal notes out of the
      # index; this fails CI if one is force-added anyway. Runs before any install —
      # stdlib-only, uses the runner's preinstalled python3.
      - name: Verify repo-hygiene detector
        run: python3 scripts/check_repo_hygiene.py --self-test

      - name: Check no internal note is tracked
        run: python3 scripts/check_repo_hygiene.py

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Black (format check)
        run: uv run black --check auto_bi tests

      # mypy gates type-correctness on our own code (not tests, whose fixtures use loose
      # typing by design). types-PyYAML is pulled in ephemerally like pytest-cov to keep
      # uv.lock lean; config (target package, third-party overrides) lives in pyproject.
      - name: Mypy (types)
        run: uv run --with mypy --with types-PyYAML mypy auto_bi

      # Integration tests (require the ClickHouse/Superset/DataLens stand) are
      # deselected by default via pyproject `addopts = -m 'not integration'`,
      # so CI stays hermetic. pytest-cov + duckdb are pulled in ephemerally to avoid
      # churning uv.lock. duckdb runs the transform SQL's numeric verification
      # (test_sqlgen_transforms) under PostgreSQL window semantics; without it those
      # tests importorskip and the numbers go unchecked.
      # --cov-fail-under gates the ratchet (D-4): the suite has held ~95% since Phase 4,
      # 90 leaves headroom for legitimate wiring code while failing on a real slide.
      - name: Pytest + coverage
        run: uv run --with pytest-cov --with duckdb pytest -q --cov=auto_bi --cov-report=term-missing --cov-fail-under=90

      # The advisor eval suite is deterministic (rule-pack findings, no LLM/stand) —
      # running it in CI machinizes part of invariant 8 (don't ship a prompt/advisor
      # change that regresses the golden anti-patterns).
      - name: Eval — advisor suite (offline)
        run: uv run auto_bi eval --suite advisor --model-path semantic/model.yaml

      # T-2 (S11): golden dialogue suite replayed from recorded fixtures — pure
      # offline replay (llm/fixture.py::FixtureLLMClient), no provider/key needed, so
      # it stays in the secret-free `quality` job. Catches regressions in everything
      # around the LLM call (spec validation, SQL generation, advisor, adapters) on
      # every PR; it does NOT catch live prompt/model drift (docs/ARCHITECTURE.md
      # §3.14) — that still needs an occasional live run against a real provider.
      # Case ids don't collide between the CH (g*/it*/f*/a*/i*) and GP (gp_*) sets,
      # so both engines' fixtures share one directory.
      - name: Eval — golden suite replay (offline, ClickHouse fixtures)
        run: uv run auto_bi eval --suite golden --llm-mode replay --fixtures-dir tests/fixtures/golden_llm --model-path semantic/model.yaml

      - name: Eval — golden suite replay (offline, Greenplum fixtures)
        run: uv run auto_bi eval --suite golden --llm-mode replay --fixtures-dir tests/fixtures/golden_llm --model-path semantic/model_gp.yaml

      # T-3 (S10): the README badge used to be a hand-edited static number that drifted
      # from the real coverage (D-3). `coverage report --format=total` reads the same
      # .coverage data the pytest step above just wrote, so the badge always reflects
      # what CI actually measured, not what someone last remembered to update.
      - name: Coverage badge data
        run: |
          pct=$(uv run --with coverage coverage report --format=total)
          if [ "$pct" -ge 90 ]; then color=success
          elif [ "$pct" -ge 75 ]; then color=yellow
          else color=critical
          fi
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "$pct" "$color" > .github/badges/coverage.json

      # Only push+main (not PRs, incl. forked ones without write access) commits the
      # badge back — a stale badge on an in-progress PR is fine, main must stay current.
      - name: Commit coverage badge (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "Badge unchanged, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git commit -m "chore(ci): update coverage badge [skip ci]"
          git push

  # C-5: known-CVE gate over the LOCKED dependency set (uv.lock is the source of truth;
  # --all-extras covers the anthropic extra too). uv export pins everything, so pip-audit
  # runs offline-resolution-free with --disable-pip.
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Export the locked dependency set
        run: uv export --format requirements-txt --all-extras --no-emit-project -o requirements-audit.txt

      - name: Audit locked dependencies for known CVEs
        run: uvx pip-audit -r requirements-audit.txt --disable-pip --require-hashes --progress-spinner off

  docker:
    name: Docker image build (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Build + smoke run (no push, no registry login): catches Dockerfile drift (D-2 —
      # the image had never once been built) on every PR. Publishing on tag is a separate
      # job in release.yml. `load: true` puts the image into the local daemon for the run.
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          load: true
          tags: auto_bi:ci

      # C-4: the image must START under non-root and report container-level health.
      # `serve` connects to the DWH eagerly at boot (make_run_query), so the smoke
      # provides a throwaway ClickHouse on a shared network. ALLOW_INSECURE_REMOTE is
      # required because serve binds 0.0.0.0 with auth off — fail-closed remote bind
      # (P0-3) would refuse to start otherwise.
      - name: Smoke run — non-root user + HEALTHCHECK healthy
        run: |
          docker network create smoke-net
          # the stock image restricts the password-less `default` user to localhost —
          # CLICKHOUSE_USER/PASSWORD makes the entrypoint create a network-reachable user
          docker run -d --name smoke-ch --network smoke-net \
            -e CLICKHOUSE_USER=smoke -e CLICKHOUSE_PASSWORD=smokepw \
            clickhouse/clickhouse-server:24.8@sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b
          for i in $(seq 1 30); do
            docker exec smoke-ch clickhouse-client -u smoke --password smokepw -q "SELECT 1" >/dev/null 2>&1 && break
            sleep 2
          done
          docker run -d --name smoke --network smoke-net \
            -e AUTO_BI_ALLOW_INSECURE_REMOTE=true \
            -e AUTO_BI_CH_HOST=smoke-ch -e AUTO_BI_CH_USER=smoke \
            -e AUTO_BI_CH_PASSWORD=smokepw -e AUTO_BI_CH_DATABASE=default \
            auto_bi:ci
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' smoke)
            [ "$status" = "healthy" ] && break
            sleep 2
          done
          docker inspect -f '{{.State.Health.Status}}' smoke
          docker inspect -f '{{.State.Health.Status}}' smoke | grep -qx healthy || { docker logs smoke; exit 1; }
          docker exec smoke id -u | grep -qx 1000
          docker exec smoke whoami | grep -qx app
          docker rm -f smoke smoke-ch
          docker network rm smoke-net

  integration:
    name: Integration (ClickHouse + Superset stand)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Superset runs in its own container and reaches ClickHouse via the compose network
      # alias, not localhost; the RO/admin passwords below match the docker-compose.yml
      # dev defaults (AUTO_BI_CH_PASSWORD/AUTO_BI_SUPERSET_PASSWORD unset -> "change_me")
      # — fine for an ephemeral, non-published CI stand.
      AUTO_BI_CH_HOST_FROM_BI: clickhouse
      AUTO_BI_CH_PASSWORD: change_me
      AUTO_BI_SUPERSET_PASSWORD: change_me
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      # 1e6 rows (vs the Mac stand's 100M default) is plenty to exercise every
      # viz_type/adapter code path without blowing the runner's time/RAM budget.
      # `--wait --wait-timeout` is the retry logic for Superset's slow first-boot
      # (db upgrade + admin bootstrap + init) — it polls the compose healthchecks
      # already defined in docker-compose.yml instead of a fixed sleep.
      - name: Bring up the stand (ClickHouse + Superset)
        env:
          DEMO_FACT_ROWS: "1000000"
        run: docker compose up -d --build --wait --wait-timeout 900

      - name: Integration tests — Superset contract suite + D-1 acceptance
        run: uv run pytest -m integration tests/test_superset_contract.py tests/test_d1_acceptance.py

      # --auto is the deterministic auto-overview path (no LLM, ARCHITECTURE §auto-overview)
      # — a real end-to-end build against the live stand needs no API key.
      - name: Live end-to-end build (auto-overview, no LLM)
        run: uv run auto_bi build --auto dm.sales_daily --target superset --model-path semantic/model.yaml

      # D-4: the same happy path a user walks — real Chromium against `serve` in the
      # public-demo profile (DisabledLLM, no key) building in the live Superset, plus an
      # axe-core scan of every UI state on the way. playwright/axe are pulled ephemerally
      # like pytest-cov/duckdb in the quality job, to keep uv.lock lean.
      - name: Install Playwright Chromium
        run: uv run --with playwright playwright install --with-deps chromium

      - name: Browser E2E — web UI happy path + axe (no LLM)
        run: uv run --with playwright --with axe-playwright-python pytest -m e2e tests/test_web_e2e.py

      - name: Stand logs (on failure, for debugging)
        if: failure()
        run: docker compose logs --tail=300

      - name: Tear down the stand
        if: always()
        run: docker compose down -v
