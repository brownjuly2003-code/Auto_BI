name: gitleaks

# Secret scan on every push and PR (audit C-5). The action scans the pushed commit
# range (full history on schedule), so a leaked credential fails CI the moment it
# lands instead of living quietly in the public repo. Suppressions, when ever needed,
# go into an explicit .gitleaks.toml allowlist — never inline "it's fine" comments.
on:
  push:
  pull_request:
  schedule:
    - cron: "15 6 * * 1"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
