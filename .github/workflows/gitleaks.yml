name: gitleaks

# Secret scan on every push and PR (audit C-5). The action scans the pushed commit
# range (full history on schedule), so a leaked credential fails CI the moment it
# lands instead of living quietly in the public repo. Suppressions, when ever needed,
# go into an explicit .gitleaks.toml allowlist — never inline "it's fine" comments.
on:
  push:
  pull_request:
  schedule:
    - cron: "15 6 * * 1"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
