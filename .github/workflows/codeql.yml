name: CodeQL

# Static analysis for the shipped language (audit C-5). PRs and main pushes get the
# default query suite; the weekly run catches newly released queries against an
# unchanged codebase (pattern shared with AB_TEST).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "45 5 * * 1"

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:python"
