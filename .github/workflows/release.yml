name: Release

# Fires only on a version tag push (git tag vX.Y.Z && git push origin vX.Y.Z), never on
# ordinary commits — cutting a release is a deliberate, separate act from merging to main
# (S10, closes D-1/D-2).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  # P1-7: a single gate that runs FIRST and fails the whole release unless the tag, the code
  # and the changelog agree on one version, the built sdist+wheel carry that version, and the
  # wheel actually installs and runs. release (GHCR + GitHub Release) and pypi both `needs` it,
  # so a stray tag `v0.3.2` while pyproject/__version__ still say `0.3.1` publishes NOTHING —
  # no more partial release where GHCR gets 0.3.2 but PyPI gets a 0.3.1 wheel.
  preflight:
    name: Preflight — version coherence, changelog, build, smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Derive version from tag
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      # Fail fast, before building: tag == pyproject.toml [project].version ==
      # auto_bi.__version__, and CHANGELOG.md carries a non-empty `## [<version>]` section
      # (not just `## [Unreleased]`). The coherence + changelog checks live in a unit-tested
      # script (scripts/release_preflight.py, tests/test_release_preflight.py).
      - name: Check version coherence + changelog section
        run: uv run python scripts/release_preflight.py "$VERSION"

      # Build once here; the pypi job downloads these exact artifacts (below) instead of
      # rebuilding, so the published bits are the ones preflight checked — no rebuild drift.
      - name: Build sdist and wheel
        run: |
          rm -rf dist
          uv build

      - name: Verify built artifacts match the tag
        run: uv run python scripts/release_preflight.py "$VERSION" --dist-dir dist

      - name: Twine check
        run: uv run --with twine twine check dist/*

      # Clean-install smoke: install ONLY the freshly built wheel into a fresh, isolated
      # environment (`--no-project` => not the project's own .venv) and confirm the package
      # imports at the tagged version and the console script runs. Catches a wheel that builds
      # but can't be installed/used.
      - name: Clean-install smoke (import + console script)
        run: |
          wheel=$(ls dist/*.whl)
          uv run --isolated --no-project --with "$wheel" python -c "import auto_bi, os; v = os.environ['VERSION']; assert auto_bi.__version__ == v, auto_bi.__version__; print('import OK', auto_bi.__version__)"
          uv run --isolated --no-project --with "$wheel" auto_bi --help

      - name: Upload built distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  release:
    needs: preflight
    runs-on: ubuntu-latest
    # C-4: job-scoped additions over the workflow defaults — id-token/attestations for
    # the image provenance attestation; contents/packages stay as the job always needed.
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Derive version and image name
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          # GHCR requires a lowercase image path; github.repository preserves the repo's case.
          echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

      # C-4: SLSA provenance for the GHCR image (mirrors the sdist/wheel `provenance`
      # job). Verify: gh attestation verify oci://<image>@<digest> --repo <owner/repo>.
      - name: Attest image provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # C-4: fail the release if the freshly pushed image carries known HIGH/CRITICAL
      # CVEs with an available fix (unfixed = reported, not blocking — nothing to bump to).
      - name: Scan pushed image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # Pulls the section between "## [<version>]" and the next "## [" heading out of
      # CHANGELOG.md so the GitHub Release body is the same text, not a duplicate to
      # keep in sync by hand.
      - name: Extract changelog section
        run: |
          awk -v ver="${{ steps.meta.outputs.version }}" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ ("\\[" ver "\\]")) { found = 1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

      # Supply-chain: a software bill of materials (SPDX JSON) for the release, generated from
      # the checked-out source (Syft reads pyproject.toml + uv.lock) — one tool, one format.
      # Attached to the GitHub Release as an asset below (GitHub's dependency graph ingests
      # SPDX natively). This run is a tag push (event=push), not a `release` event, so the
      # action's own release-asset upload never fires; attach it via action-gh-release's
      # `files:` instead, and disable the action's own uploads so no stray workflow artifact
      # is produced.
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: autobi-agent.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          name: v${{ steps.meta.outputs.version }}
          body_path: release_notes.md
          generate_release_notes: false
          files: autobi-agent.spdx.json

  # X-2: PyPI publication via Trusted Publishing (OIDC) — no long-lived token in secrets.
  # The trusted publisher (project `autobi-agent`, owner `brownjuly2003-code`, repo
  # `Auto_BI`, workflow `release.yml`, environment `pypi`) is registered on pypi.org since
  # 2026-07-10; a tag publishes without further setup. The distribution is named
  # `autobi-agent`, NOT `auto-bi`: PyPI folds separators when comparing names, so `auto-bi`
  # collides with the pre-existing placeholder project `autobi` and is refused as "too
  # similar". The importable package and the console script stay `auto_bi`.
  #
  # P1-7: publishes the sdist+wheel built and verified by preflight (downloaded below), not a
  # fresh rebuild — the bits on PyPI are exactly the ones twine-checked and smoke-installed.
  pypi:
    needs: preflight
    runs-on: ubuntu-latest
    # `environment: pypi` also gates this job behind any protection rules configured for that
    # environment in repo settings (Settings → Environments → pypi). None are set by default,
    # so behaviour is unchanged; adding "Required reviewers" there turns every PyPI publish
    # into a manual approval without touching this file (see docs/DEPLOYMENT.md §2).
    environment:
      name: pypi
      # Deep-links the deployment (and the approval prompt, once reviewers are enabled) to the
      # exact version being published on PyPI.
      url: https://pypi.org/project/autobi-agent/${{ needs.preflight.outputs.version }}/
    permissions:
      id-token: write  # OIDC: PyPI trusted publishing + PEP 740 attestation signing
      contents: read
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # PEP 740: under trusted publishing, gh-action-pypi-publish (v1.11+) signs and
          # uploads attestations by default via the ambient OIDC identity. `@release/v1`
          # already tracks a version with this on; set it explicitly so a future default flip
          # can't silently drop it. Consumes the job's `id-token: write` above.
          attestations: true

  # Supply-chain: SLSA build provenance for the EXACT sdist+wheel that preflight built and
  # pypi publishes. Attests each dist file's digest to this workflow run via Sigstore +
  # GitHub's attestation store; consumers verify later with
  # `gh attestation verify <file> --repo brownjuly2003-code/Auto_BI`. Independent of
  # release/pypi (all three only `needs: preflight`) — provenance binds the build, not the
  # publication — and, like the rest of this workflow, runs only on a real `vX.Y.Z` tag push.
  provenance:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # mint the Sigstore OIDC token
      attestations: write  # persist the attestation to the repo's attestation store
      contents: read
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Attest build provenance (sdist + wheel)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "dist/*"
