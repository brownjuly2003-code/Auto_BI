[project]
name = "auto-bi"
version = "0.1.0"
description = "Agent: text / field layout -> dashboard in selected BI on top of DWH DM layer"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "httpx>=0.27",
    "sqlglot>=25.0",
    "pyyaml>=6.0",
    "rich>=13.7",
    "clickhouse-connect>=0.8",
]

[dependency-groups]
dev = [
    "pytest>=8.2",
    "ruff>=0.6",
    "black>=24.4",
    "pre-commit>=3.7",
]

[project.scripts]
auto_bi = "auto_bi.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["auto_bi"]

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".tmp"]  # scratch scripts, not part of the codebase

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
# Russian text in prompts/fixtures is by design, not a homoglyph typo
ignore = ["RUF001", "RUF002", "RUF003"]

[tool.black]
target-version = ["py312"]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: requires running ClickHouse/Superset stand (docker, runs on Mac)",
]
addopts = "-m 'not integration'"
